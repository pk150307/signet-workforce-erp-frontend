<header class="topbar">
  <button mat-icon-button class="topbar__menu-btn" (click)="menuToggle.emit()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="topbar__spacer"></div>

  <div class="topbar__search">
    <mat-icon class="topbar__search-icon">search</mat-icon>
    <input type="text" class="topbar__search-input" placeholder="Search employees, clients, sites..." aria-label="Global search">
  </div>

  <div class="topbar__actions">
    <button mat-icon-button class="topbar__action-btn" (click)="themeService.toggle()" [matTooltip]="themeService.isDark() ? 'Light mode' : 'Dark mode'" [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button
      mat-icon-button
      class="topbar__action-btn"
      matTooltip="Notifications"
      aria-label="Notifications"
      [matMenuTriggerFor]="notificationsMenu"
      (menuOpened)="onNotificationsMenuOpened()">
      <mat-icon
        [matBadge]="unreadCount() || null"
        matBadgeColor="warn"
        matBadgeSize="small"
        [matBadgeHidden]="unreadCount() === 0">
        notifications
      </mat-icon>
    </button>

    <mat-menu #notificationsMenu="matMenu" xPosition="before" class="topbar__notifications-menu">
      <div class="topbar__notifications-header">
        <span>Notifications</span>
        <button mat-button type="button" *ngIf="unreadCount() > 0" (click)="markAllRead(); $event.stopPropagation()">Mark all read</button>
      </div>
      <mat-divider></mat-divider>
      <div class="topbar__notifications-empty" *ngIf="!loadingNotifications() && notifications().length === 0">
        No notifications
      </div>
      <button
        mat-menu-item
        type="button"
        *ngFor="let item of notifications()"
        (click)="openNotification(item)"
        [class.topbar__notification--unread]="!item.isRead">
        <div class="topbar__notification-item">
          <strong>{{ item.title }}</strong>
          <span>{{ item.message }}</span>
          <small>{{ item.createdAt | date:'short' }}</small>
        </div>
      </button>
    </mat-menu>

    <button mat-button class="topbar__user-btn" [matMenuTriggerFor]="userMenu" aria-label="User account menu">
      <div class="topbar__user-avatar">
        {{ (authService.userFullName() || 'U').charAt(0).toUpperCase() }}
      </div>
      <mat-icon class="topbar__user-caret">expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <button mat-menu-item routerLink="/auth/profile">
        <mat-icon>person</mat-icon>
        <span>My Profile</span>
      </button>
      <button mat-menu-item routerLink="/auth/change-password">
        <mat-icon>lock</mat-icon>
        <span>Change Password</span>
      </button>
      <button mat-menu-item routerLink="/settings">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <mat-divider />
      <button mat-menu-item (click)="authService.logout()">
        <mat-icon color="warn">logout</mat-icon>
        <span class="topbar__logout">Sign Out</span>
      </button>
    </mat-menu>
  </div>
</header>
