<nav class="sidebar" [class.sidebar--collapsed]="collapsed">
  <div class="sidebar__brand">
    <div class="sidebar__brand-logo">
      <mat-icon>security</mat-icon>
    </div>
    @if (!collapsed) {
      <div class="sidebar__brand-text">
        <span class="sidebar__brand-name">Signet ERP</span>
        <span class="sidebar__brand-tagline">Workforce Manager</span>
      </div>
    }
  </div>

  <mat-divider />

  @if (!collapsed) {
    <div class="sidebar__user">
      <div class="sidebar__user-avatar">
        {{ (authService.userFullName() || 'U').charAt(0).toUpperCase() }}
      </div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ authService.userFullName() }}</span>
        <span class="sidebar__user-role">{{ authService.userRoles()[0] || 'User' }}</span>
      </div>
    </div>
    <mat-divider />
  }

  <div class="sidebar__nav">
    @for (item of navItems(); track item.route) {
      <button
        class="sidebar__nav-item"
        [class.sidebar__nav-item--active]="isActive(item.route || '')"
        (click)="navigate(item)"
        [matTooltip]="collapsed ? item.label : ''"
        matTooltipPosition="right">
        <mat-icon class="sidebar__nav-icon">{{ item.icon }}</mat-icon>
        @if (!collapsed) {
          <span class="sidebar__nav-label">{{ item.label }}</span>
          @if (item.badge) {
            <span class="sidebar__nav-badge">{{ item.badge }}</span>
          }
        }
      </button>
    }
  </div>
</nav>
