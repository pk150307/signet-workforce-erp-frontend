<div class="print-toolbar no-print">
  <div class="print-toolbar__left">
    <strong>Payslip Preview</strong>
    <span *ngIf="payslip() as ps">{{ ps.employeeName }} · {{ ps.month }}/{{ ps.year }}</span>
  </div>
  <div class="print-toolbar__actions">
    <button mat-stroked-button (click)="downloadPdf()" [disabled]="!payslip() || downloading()">
      <mat-icon>picture_as_pdf</mat-icon>
      {{ downloading() ? 'Generating…' : 'Download PDF' }}
    </button>
    <button mat-raised-button color="primary" (click)="print()" [disabled]="!payslip()">
      <mat-icon>print</mat-icon> Print
    </button>
  </div>
</div>

<div class="loading-state no-print" *ngIf="loading()">
  <app-skeleton-loader type="card" [rows]="10"></app-skeleton-loader>
</div>

<div class="payslip-preview-wrap" *ngIf="!loading() && payslip() as ps">
  <app-payslip-document [ps]="ps" />
</div>
