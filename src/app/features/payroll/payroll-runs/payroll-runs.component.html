<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">Payroll</h1>
      <p class="page-header__subtitle">Process and manage monthly payroll</p>
    </div>
    <div class="page-header__actions">
      <button mat-raised-button color="primary" routerLink="/payroll/payslips">
        <mat-icon>description</mat-icon> Payslips
      </button>
    </div>
  </div>

  <div class="kpi-grid">
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--purple"><mat-icon>payments</mat-icon></div>
      <div>
        <div class="stat-card__value">{{ formatCurrency(currentMonthPayroll()) }}</div>
        <div class="stat-card__label">This Month Payroll</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon stat-card__icon--orange"><mat-icon>pending_actions</mat-icon></div>
      <div>
        <div class="stat-card__value">{{ pendingApproval() }}</div>
        <div class="stat-card__label">Pending Approval</div>
      </div>
    </div>
  </div>

  <div class="card">
    <p>Run payroll processing for the current month. Connect to <code>POST /api/payroll/process</code> when ready.</p>
    <button mat-raised-button color="primary" style="margin-top: 16px;">
      <mat-icon>play_arrow</mat-icon> Process Payroll
    </button>
  </div>
</div>
