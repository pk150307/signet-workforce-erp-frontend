<div class="page-container">
  <div class="page-header"><div><h1 class="page-header__title">Leave Approval</h1><p class="page-header__subtitle">{{ data()?.totalCount ?? 0 }} records</p></div>
    <div class="page-header__actions"><button mat-stroked-button (click)="load()"><mat-icon>refresh</mat-icon></button></div></div>
  <div class="filter-bar"><mat-form-field appearance="outline" class="filter-bar__search"><mat-label>Search...</mat-label><mat-icon matPrefix>search</mat-icon><input matInput [formControl]="searchCtrl"></mat-form-field></div>
  <app-skeleton-loader *ngIf="loading()" type="table" [rows]="6"></app-skeleton-loader>
  <div class="card card--flush" *ngIf="!loading()">
    <app-empty-state *ngIf="data()?.items?.length === 0" icon="beach_access" title="No records" description="No leave records found."></app-empty-state>
    <div class="table-scroll">
    <mat-table [dataSource]="data()?.items ?? []" *ngIf="(data()?.items?.length ?? 0) > 0">      <ng-container matColumnDef="employeeName"><mat-header-cell *matHeaderCellDef>employeeName</mat-header-cell><mat-cell *matCellDef="let row">{{ row.employeeName ?? '—' }}</mat-cell></ng-container>
      <ng-container matColumnDef="leaveType"><mat-header-cell *matHeaderCellDef>leaveType</mat-header-cell><mat-cell *matCellDef="let row">{{ row.leaveType ?? '—' }}</mat-cell></ng-container>
      <ng-container matColumnDef="fromDate"><mat-header-cell *matHeaderCellDef>fromDate</mat-header-cell><mat-cell *matCellDef="let row">{{ row.fromDate ?? '—' }}</mat-cell></ng-container>
      <ng-container matColumnDef="toDate"><mat-header-cell *matHeaderCellDef>toDate</mat-header-cell><mat-cell *matCellDef="let row">{{ row.toDate ?? '—' }}</mat-cell></ng-container>
      <ng-container matColumnDef="days"><mat-header-cell *matHeaderCellDef>days</mat-header-cell><mat-cell *matCellDef="let row">{{ row.days ?? '—' }}</mat-cell></ng-container>
      <ng-container matColumnDef="status"><mat-header-cell *matHeaderCellDef>status</mat-header-cell><mat-cell *matCellDef="let row">{{ row.status ?? '—' }}</mat-cell></ng-container>
      <mat-header-row *matHeaderRowDef="cols"></mat-header-row><mat-row *matRowDef="let row; columns: cols;"></mat-row></mat-table>
      </div>
    <mat-paginator *ngIf="(data()?.totalCount ?? 0) > 0" [length]="data()?.totalCount ?? 0" [pageSize]="pageSize" [pageIndex]="page - 1" [pageSizeOptions]="[10,20,50]" (page)="onPageChange($event)"></mat-paginator>
  </div></div>
