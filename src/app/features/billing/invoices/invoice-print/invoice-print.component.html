<div class="print-toolbar no-print">
  <div class="print-toolbar__left">
    <strong>Invoice Preview</strong>
    <span *ngIf="invoice() as inv">{{ inv.invoiceNumber }}</span>
  </div>
  <div class="print-toolbar__actions">
    <button mat-stroked-button (click)="downloadPdf()" [disabled]="!invoice() || downloading()">
      <mat-icon>picture_as_pdf</mat-icon>
      {{ downloading() ? 'Generating…' : 'Download PDF' }}
    </button>
    <button mat-raised-button color="primary" (click)="print()" [disabled]="!invoice()">
      <mat-icon>print</mat-icon> Print
    </button>
  </div>
</div>

<div class="loading-state no-print" *ngIf="loading()">
  <app-skeleton-loader type="card" [rows]="10"></app-skeleton-loader>
</div>

<div class="invoice-preview-wrap" *ngIf="!loading() && invoice() as inv">
  <app-invoice-document [inv]="inv" />
</div>
