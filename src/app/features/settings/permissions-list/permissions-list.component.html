<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">Permission Matrix</h1>
      <p class="page-header__subtitle">All system permissions grouped by module. Assign permissions to roles from the Roles page.</p>
    </div>
    <div class="page-header__actions">
      <button mat-stroked-button type="button" (click)="load()"><mat-icon>refresh</mat-icon></button>
    </div>
  </div>

  <app-skeleton-loader *ngIf="loading()" type="table" [rows]="6"></app-skeleton-loader>

  <div *ngIf="!loading()">
    <app-empty-state *ngIf="groups().length === 0" icon="lock" title="No permissions found" description="Permissions will appear here once configured."></app-empty-state>

    <mat-accordion multi class="permissions-matrix" *ngIf="groups().length > 0">
      <mat-expansion-panel *ngFor="let group of groups()">
        <mat-expansion-panel-header>
          <mat-panel-title>{{ group.module }}</mat-panel-title>
          <mat-panel-description>{{ group.permissions.length }} permissions</mat-panel-description>
        </mat-expansion-panel-header>
        <div class="permissions-matrix__item" *ngFor="let perm of group.permissions">
          <div class="permissions-matrix__key">{{ perm.key }}</div>
          <div class="permissions-matrix__desc">{{ perm.description || perm.action }}</div>
          <mat-chip-set>
            <mat-chip>{{ perm.action }}</mat-chip>
          </mat-chip-set>
        </div>
      </mat-expansion-panel>
    </mat-accordion>
  </div>
</div>
