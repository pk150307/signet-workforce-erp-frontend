<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">Audit Logs</h1>
      <p class="page-header__subtitle">{{ data()?.totalCount ?? 0 }} records</p>
    </div>
    <div class="page-header__actions">
      <button mat-stroked-button type="button" (click)="load()"><mat-icon>refresh</mat-icon></button>
      <button mat-stroked-button type="button" *ngIf="canExport" (click)="exportCsv()"><mat-icon>download</mat-icon> Export</button>
    </div>
  </div>

  <div class="filter-bar">
    <mat-form-field appearance="outline" class="filter-bar__search">
      <mat-label>Search</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [formControl]="searchCtrl">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Module</mat-label>
      <input matInput [formControl]="moduleCtrl">
    </mat-form-field>
  </div>

  <app-skeleton-loader *ngIf="loading()" type="table" [rows]="6"></app-skeleton-loader>

  <div class="card card--flush" *ngIf="!loading()">
    <app-empty-state *ngIf="data()?.items?.length === 0" icon="history" title="No audit logs" description="No activity matches your filters."></app-empty-state>
    <div class="table-scroll" *ngIf="(data()?.items?.length ?? 0) > 0">
      <mat-table [dataSource]="data()?.items ?? []">
        <ng-container matColumnDef="createdAt"><mat-header-cell *matHeaderCellDef>Time</mat-header-cell><mat-cell *matCellDef="let row">{{ row.createdAt | date:'medium' }}</mat-cell></ng-container>
        <ng-container matColumnDef="userName"><mat-header-cell *matHeaderCellDef>User</mat-header-cell><mat-cell *matCellDef="let row">{{ row.userName || row.createdBy || '—' }}</mat-cell></ng-container>
        <ng-container matColumnDef="module"><mat-header-cell *matHeaderCellDef>Module</mat-header-cell><mat-cell *matCellDef="let row">{{ row.module || '—' }}</mat-cell></ng-container>
        <ng-container matColumnDef="action"><mat-header-cell *matHeaderCellDef>Action</mat-header-cell><mat-cell *matCellDef="let row">{{ row.action }}</mat-cell></ng-container>
        <ng-container matColumnDef="entityType"><mat-header-cell *matHeaderCellDef>Entity</mat-header-cell><mat-cell *matCellDef="let row">{{ row.entityType }}</mat-cell></ng-container>
        <ng-container matColumnDef="ipAddress"><mat-header-cell *matHeaderCellDef>IP</mat-header-cell><mat-cell *matCellDef="let row">{{ row.ipAddress || '—' }}</mat-cell></ng-container>
        <mat-header-row *matHeaderRowDef="cols"></mat-header-row>
        <mat-row *matRowDef="let row; columns: cols;"></mat-row>
      </mat-table>
    </div>
    <mat-paginator *ngIf="(data()?.totalCount ?? 0) > 0" [length]="data()?.totalCount ?? 0" [pageSize]="pageSize" [pageIndex]="page - 1" [pageSizeOptions]="[10,20,50]" (page)="onPageChange($event)"></mat-paginator>
  </div>
</div>
