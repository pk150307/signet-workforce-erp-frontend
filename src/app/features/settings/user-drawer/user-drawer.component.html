<div class="user-drawer">
  <div class="user-drawer__header">
    <h2>{{ isEditMode ? 'Edit User' : 'Create User' }}</h2>
    <button mat-icon-button type="button" (click)="close()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <app-skeleton-loader *ngIf="loading()" type="form" [rows]="6"></app-skeleton-loader>

  <form *ngIf="!loading()" class="user-drawer__form" [formGroup]="form" (ngSubmit)="save()">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" autocomplete="off">
    </mat-form-field>

    <div class="user-drawer__row">
      <mat-form-field appearance="outline">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Mobile</mat-label>
      <input matInput formControlName="mobile">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Roles</mat-label>
      <mat-select formControlName="roleIds" multiple>
        <mat-option *ngFor="let role of roles()" [value]="role.id">{{ role.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-checkbox formControlName="isActive">Active</mat-checkbox>
    <mat-checkbox *ngIf="!isEditMode" formControlName="forcePasswordReset">Force password reset on first login</mat-checkbox>

    <div class="user-drawer__meta" *ngIf="detail() as user">
      <mat-divider></mat-divider>
      <p><strong>Status:</strong> {{ user.status }}</p>
      <p *ngIf="user.accountLocked"><strong>Account locked</strong></p>
      <p *ngIf="user.lastLoginAt"><strong>Last login:</strong> {{ user.lastLoginAt | date:'medium' }}</p>
    </div>

    <div class="user-drawer__actions">
      <button mat-stroked-button type="button" (click)="close()">Cancel</button>
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="saving() || (isEditMode ? !canUpdate : !canCreate)">
        <mat-spinner *ngIf="saving()" diameter="18"></mat-spinner>
        <span *ngIf="!saving()">{{ isEditMode ? 'Save Changes' : 'Create User' }}</span>
      </button>
    </div>
  </form>
</div>
