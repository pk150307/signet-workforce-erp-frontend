<mat-sidenav-container class="roles-list__container">
  <mat-sidenav-content>
    <div class="page-container">
      <div class="page-header">
        <div>
          <h1 class="page-header__title">Roles</h1>
          <p class="page-header__subtitle">{{ data()?.totalCount ?? 0 }} records</p>
        </div>
        <div class="page-header__actions">
          <button mat-stroked-button type="button" (click)="load()"><mat-icon>refresh</mat-icon></button>
        </div>
      </div>

      <div class="filter-bar">
        <mat-form-field appearance="outline" class="filter-bar__search">
          <mat-label>Search roles</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput [formControl]="searchCtrl">
        </mat-form-field>
      </div>

      <app-skeleton-loader *ngIf="loading()" type="table" [rows]="6"></app-skeleton-loader>

      <div class="card card--flush" *ngIf="!loading()">
        <app-empty-state *ngIf="data()?.items?.length === 0" icon="admin_panel_settings" title="No roles found" description="No roles match your search."></app-empty-state>

        <div class="table-scroll" *ngIf="(data()?.items?.length ?? 0) > 0">
          <mat-table [dataSource]="data()?.items ?? []">
            <ng-container matColumnDef="name"><mat-header-cell *matHeaderCellDef>Role</mat-header-cell><mat-cell *matCellDef="let row">{{ row.name }}</mat-cell></ng-container>
            <ng-container matColumnDef="description"><mat-header-cell *matHeaderCellDef>Description</mat-header-cell><mat-cell *matCellDef="let row">{{ row.description || '—' }}</mat-cell></ng-container>
            <ng-container matColumnDef="userCount"><mat-header-cell *matHeaderCellDef>Users</mat-header-cell><mat-cell *matCellDef="let row">{{ row.userCount }}</mat-cell></ng-container>
            <ng-container matColumnDef="permissionCount"><mat-header-cell *matHeaderCellDef>Permissions</mat-header-cell><mat-cell *matCellDef="let row">{{ row.permissionCount }}</mat-cell></ng-container>
            <ng-container matColumnDef="isSystem"><mat-header-cell *matHeaderCellDef>System</mat-header-cell><mat-cell *matCellDef="let row">{{ row.isSystem ? 'Yes' : 'No' }}</mat-cell></ng-container>
            <ng-container matColumnDef="isActive"><mat-header-cell *matHeaderCellDef>Active</mat-header-cell><mat-cell *matCellDef="let row">{{ row.isActive ? 'Yes' : 'No' }}</mat-cell></ng-container>
            <ng-container matColumnDef="actions">
              <mat-header-cell *matHeaderCellDef></mat-header-cell>
              <mat-cell *matCellDef="let row">
                <button mat-stroked-button type="button" *ngIf="canUpdate" (click)="openPermissions(row)">
                  <mat-icon>security</mat-icon> Permissions
                </button>
              </mat-cell>
            </ng-container>
            <mat-header-row *matHeaderRowDef="cols"></mat-header-row>
            <mat-row *matRowDef="let row; columns: cols;"></mat-row>
          </mat-table>
        </div>

        <mat-paginator *ngIf="(data()?.totalCount ?? 0) > 0" [length]="data()?.totalCount ?? 0" [pageSize]="pageSize" [pageIndex]="page - 1" [pageSizeOptions]="[10,20,50]" (page)="onPageChange($event)"></mat-paginator>
      </div>
    </div>
  </mat-sidenav-content>

  <mat-sidenav class="roles-list__drawer" position="end" mode="over" [opened]="drawerOpen()" (closedStart)="closeDrawer()">
    <app-role-permissions-drawer *ngIf="selectedRoleId() as roleId" [roleId]="roleId" (closed)="closeDrawer()" (saved)="onSaved()"></app-role-permissions-drawer>
  </mat-sidenav>
</mat-sidenav-container>
