<div class="page-container">
  <div class="page-header"><div><h1 class="page-header__title">Site Dashboard</h1><p class="page-header__subtitle">Deployment and headcount overview</p></div>
    <div class="page-header__actions"><button mat-stroked-button (click)="load()"><mat-icon>refresh</mat-icon></button><button mat-stroked-button routerLink="/sites"><mat-icon>list</mat-icon> All Sites</button></div></div>
  <app-skeleton-loader *ngIf="loading()" type="card" [rows]="4"></app-skeleton-loader>
  <ng-container *ngIf="!loading() && summary() as s">
    <div class="kpi-grid">
      <div class="stat-card"><div class="stat-card__icon stat-card__icon--blue"><mat-icon>location_on</mat-icon></div><div><div class="stat-card__value">{{ s.totalSites }}</div><div class="stat-card__label">Total Sites</div></div></div>
      <div class="stat-card"><div class="stat-card__icon stat-card__icon--green"><mat-icon>check_circle</mat-icon></div><div><div class="stat-card__value">{{ s.activeSites }}</div><div class="stat-card__label">Active Sites</div></div></div>
      <div class="stat-card"><div class="stat-card__icon stat-card__icon--purple"><mat-icon>groups</mat-icon></div><div><div class="stat-card__value">{{ s.totalDeployed }}/{{ s.totalHeadcountRequired }}</div><div class="stat-card__label">Deployed / Required</div></div></div>
      <div class="stat-card"><div class="stat-card__icon stat-card__icon--orange"><mat-icon>warning</mat-icon></div><div><div class="stat-card__value">{{ s.understaffedSites }}</div><div class="stat-card__label">Understaffed</div></div></div>
    </div>
  </ng-container>
</div>
