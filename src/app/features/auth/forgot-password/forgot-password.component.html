<app-auth-layout
  title="Forgot Password"
  subtitle="Enter your email and we'll send you a reset link.">
  @if (!submitted()) {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="forgot-form">
      <mat-form-field appearance="outline">
        <mat-label>Email Address</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email">
        @if (form.get('email')?.hasError('required')) {
          <mat-error>Email is required</mat-error>
        }
        @if (form.get('email')?.hasError('email')) {
          <mat-error>Enter a valid email</mat-error>
        }
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" class="forgot-form__submit" [disabled]="loading()">
        @if (loading()) {
          <mat-spinner diameter="20" />
        } @else {
          Send Reset Link
        }
      </button>
    </form>
  } @else {
    <p class="success-message">
      Check your inbox for password reset instructions. If you don't see it, check your spam folder.
    </p>
  }
</app-auth-layout>
