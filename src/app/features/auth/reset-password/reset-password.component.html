<app-auth-layout title="Reset Password" subtitle="Create a new password for your account.">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="reset-form">
    <mat-form-field appearance="outline">
      <mat-label>New Password</mat-label>
      <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
      <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
        <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      @if (form.get('password')?.hasError('minlength')) {
        <mat-error>Minimum 8 characters</mat-error>
      }
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Confirm Password</mat-label>
      <input matInput type="password" formControlName="confirmPassword">
      @if (form.hasError('mismatch')) {
        <mat-error>Passwords do not match</mat-error>
      }
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit" class="reset-form__submit" [disabled]="loading()">
      @if (loading()) { <mat-spinner diameter="20" /> } @else { Reset Password }
    </button>
  </form>
</app-auth-layout>
