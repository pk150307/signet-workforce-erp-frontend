@if (password()) {
  <div class="password-strength">
    <p class="password-strength__label">Password strength: {{ result().label }}</p>
    <div class="password-strength__bar" aria-hidden="true">
      @for (segment of segments; track segment) {
        <span
          class="password-strength__segment"
          [class.password-strength__segment--active-1]="result().score >= segment && result().score === 1"
          [class.password-strength__segment--active-2]="result().score >= segment && result().score === 2"
          [class.password-strength__segment--active-3]="result().score >= segment && result().score === 3"
          [class.password-strength__segment--active-4]="result().score >= segment && result().score >= 4">
        </span>
      }
    </div>
    <ul class="password-strength__checks">
      @for (check of result().checks; track check.label) {
        <li
          class="password-strength__check"
          [class.password-strength__check--passed]="check.passed">
          <mat-icon>{{ check.passed ? 'check_circle' : 'radio_button_unchecked' }}</mat-icon>
          <span>{{ check.label }}</span>
        </li>
      }
    </ul>
  </div>
}
