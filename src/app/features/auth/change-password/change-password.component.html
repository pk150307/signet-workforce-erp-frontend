<div class="page-container change-password">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">Change Password</h1>
      <p class="page-header__subtitle">Update your account password</p>
    </div>
  </div>

  <div class="card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="change-password__form">
      <mat-form-field appearance="outline">
        <mat-label>Current Password</mat-label>
        <input matInput type="password" formControlName="currentPassword">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>New Password</mat-label>
        <input matInput type="password" formControlName="newPassword">
        @if (form.get('newPassword')?.hasError('minlength')) {
          <mat-error>Minimum 8 characters</mat-error>
        }
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Confirm New Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword">
        @if (form.hasError('mismatch')) {
          <mat-error>Passwords do not match</mat-error>
        }
      </mat-form-field>
      <button mat-raised-button color="primary" type="submit" class="change-password__submit" [disabled]="loading()">
        @if (loading()) { <mat-spinner diameter="20" /> } @else { Update Password }
      </button>
    </form>
  </div>
</div>
