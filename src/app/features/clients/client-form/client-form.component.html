<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-header__title">{{ isEdit() ? 'Edit Client' : 'Add Client' }}</h1>
    </div>
    <button mat-stroked-button (click)="router.navigate(['/clients'])">Cancel</button>
  </div>
  <div class="card" style="max-width:800px">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Company Name *</mat-label>
          <input matInput formControlName="companyName">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Contact Person *</mat-label>
          <input matInput formControlName="contactPerson">
        </mat-form-field>
      </div>
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Email *</mat-label>
          <input matInput formControlName="email">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Phone *</mat-label>
          <input matInput formControlName="phone">
        </mat-form-field>
      </div>
      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>GST Number</mat-label>
          <input matInput formControlName="gstNumber">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>City</mat-label>
          <input matInput formControlName="city">
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>State</mat-label>
          <input matInput formControlName="state">
        </mat-form-field>
      </div>
      <mat-form-field appearance="outline" style="width:100%">
        <mat-label>Address</mat-label>
        <textarea matInput formControlName="address" rows="2"></textarea>
      </mat-form-field>
      <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px">
        <button mat-stroked-button type="button" (click)="router.navigate(['/clients'])">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="saving()">
          <mat-spinner *ngIf="saving()" diameter="18"></mat-spinner>
          {{ isEdit() ? 'Save Changes' : 'Create Client' }}
        </button>
      </div>
    </form>
  </div>
</div>
