<h2 mat-dialog-title class="confirm-dialog__title">
  <span
    class="confirm-dialog__icon"
    [class.confirm-dialog__icon--warn]="data.confirmColor === 'warn'"
    *ngIf="data.icon">
    <mat-icon>{{ data.icon }}</mat-icon>
  </span>
  {{ data.title }}
</h2>

<mat-dialog-content class="confirm-dialog__content">
  <p class="confirm-dialog__message">{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end" class="confirm-dialog__actions">
  <button mat-stroked-button type="button" (click)="onCancel()">
    {{ data.cancelLabel || 'Cancel' }}
  </button>
  <button
    mat-flat-button
    type="button"
    [color]="data.confirmColor || 'primary'"
    (click)="onConfirm()">
    {{ data.confirmLabel || 'Confirm' }}
  </button>
</mat-dialog-actions>
