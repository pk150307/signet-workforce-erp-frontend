<div class="confirm-dialog">
  <div class="confirm-dialog__header">
    <div class="confirm-dialog__icon" *ngIf="data.icon">
      <mat-icon>{{ data.icon }}</mat-icon>
    </div>
    <div>
      <h2 class="confirm-dialog__title">{{ data.title }}</h2>
      <p class="confirm-dialog__message">{{ data.message }}</p>
    </div>
  </div>
  <div class="confirm-dialog__actions">
    <button mat-button (click)="onCancel()">{{ data.cancelLabel || 'Cancel' }}</button>
    <button mat-raised-button [color]="data.confirmColor || 'primary'" (click)="onConfirm()">
      {{ data.confirmLabel || 'Confirm' }}
    </button>
  </div>
</div>
